<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini API Key Debugger</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 2rem; background: #f8fafc; color: #1e293b; max-width: 800px; mx-auto; }
        .card { background: white; padding: 2rem; border-radius: 1rem; shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); border: 1px solid #e2e8f0; }
        h1 { margin-top: 0; color: #0f172a; }
        input { width: 100%; padding: 0.75rem; border: 2px solid #e2e8f0; border-radius: 0.5rem; margin-bottom: 1rem; box-sizing: border-box; font-family: monospace; }
        button { background: #2563eb; color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 0.5rem; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #1d4ed8; }
        #results { margin-top: 2rem; padding: 1rem; border-radius: 0.5rem; white-space: pre-wrap; font-family: monospace; font-size: 0.875rem; }
        .success { background: #f0fdf4; border: 1px solid #bbf7d0; color: #166534; }
        .error { background: #fef2f2; border: 1px solid #fecaca; color: #991b1b; }
        .model-list { list-style: none; padding: 0; }
        .model-item { padding: 0.5rem; border-bottom: 1px solid #f1f5f9; display: flex; justify-content: space-between; }
        .highlight { font-weight: bold; color: #2563eb; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Gemini API Key Debugger</h1>
        <p>Paste your API key below and click "Fetch Models" to see what your key has access to.</p>
        
        <input type="text" id="apiKey" placeholder="AIzaSy..." spellcheck="false">
        <button onclick="fetchModels()">Fetch Models</button>

        <div id="results"></div>
    </div>

    <script>
        async function fetchModels() {
            const key = document.getElementById('apiKey').value.trim();
            const resultsDiv = document.getElementById('results');
            
            if (!key) {
                resultsDiv.className = 'error';
                resultsDiv.innerHTML = 'Please enter an API key.';
                return;
            }

            resultsDiv.className = '';
            resultsDiv.innerHTML = 'Thinking...';

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${key}`);
                const data = await response.json();

                if (data.error) {
                    resultsDiv.className = 'error';
                    resultsDiv.innerHTML = `<strong>Error ${data.error.code}:</strong> ${data.error.message}`;
                } else if (data.models) {
                    resultsDiv.className = 'success';
                    let html = '<strong>Success! Found ' + data.models.length + ' models:</strong><ul class="model-list">';
                    
                    data.models.forEach(model => {
                        const isFlash = model.name.includes('flash');
                        const style = isFlash ? 'highlight' : '';
                        const methods = model.supportedGenerationMethods || model.supportedMethods || [];
                        html += `<li class="model-item ${style}">
                            <span>${model.name}</span>
                            <small>${methods.join(', ') || 'N/A'}</small>
                        </li>`;
                    });
                    
                    html += '</ul>';
                    resultsDiv.innerHTML = html;
                } else {
                    resultsDiv.className = 'error';
                    resultsDiv.innerHTML = 'Unexpected response format: ' + JSON.stringify(data);
                }
            } catch (err) {
                resultsDiv.className = 'error';
                resultsDiv.innerHTML = `<strong>Network Error:</strong> ${err.message}. Are you offline or blocked by CORS?`;
            }
        }
    </script>
</body>
</html>
